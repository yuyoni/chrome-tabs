<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Tab Memory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 Smart Tab Memory</h1>
      <p class="subtitle">Search your browsing history</p>
    </header>

    <div class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title or URL..."
        autofocus
      >
      <div class="search-info">
        <span id="resultCount">0 results</span>
        <button id="clearHistory" class="btn-secondary">Clear History</button>
      </div>
    </div>

    <div class="tabs-section">
      <div id="suggestionsSection" class="suggestions">
        <h3>💡 Recently Closed</h3>
        <div id="suggestionsList"></div>
      </div>

      <div id="resultsSection" class="results">
        <div id="resultsList"></div>
      </div>

      <div id="emptyState" class="empty-state">
        <p>No tabs found. Start browsing to build your tab memory! 🚀</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
